# AutoGen → MAF mapping knowledge base
#
# Fields:
#   name        - AutoGen class/symbol name
#   module      - AutoGen import module
#   generation  - "0.4" or "0.2"
#   status      - auto | partial | manual | unknown
#                 auto    = mechanical rename/restructure, no semantic gap
#                 partial = mostly mechanical but has config/param differences
#                 manual  = pattern change required (not a simple rename)
#                 unknown = no known MAF equivalent yet
#   maf_equivalent - MAF class/symbol name (required for status=auto)
#   maf_module     - MAF import module for the equivalent
#   guide_link  - learn.microsoft.com section covering this mapping
#   ag2_note    - destination-neutral note if AG2 is a plausible alternative
#   notes       - free-form migration note for the engineer
#
# Source: https://learn.microsoft.com/en-us/agent-framework/migration-guide/from-autogen/
# Constructs are ordered by corpus frequency then generation (0.4 first).

# ── Model clients ──────────────────────────────────────────────────────────────

- name: OpenAIChatCompletionClient
  module: autogen_ext.models.openai
  generation: "0.4"
  status: auto
  maf_equivalent: OpenAIChatCompletionClient
  maf_module: agent_framework.openai
  guide_link: https://learn.microsoft.com/en-us/agent-framework/migration-guide/from-autogen/#model-client-creation-and-configuration
  notes: >
    Same class name, different import path. API key is read from environment
    (OPENAI_API_KEY) by default — drop explicit api_key= arg.

- name: AzureOpenAIChatCompletionClient
  module: autogen_ext.models.openai
  generation: "0.4"
  status: partial
  maf_equivalent: OpenAIChatCompletionClient
  maf_module: agent_framework.openai
  guide_link: https://learn.microsoft.com/en-us/agent-framework/migration-guide/from-autogen/#model-client-creation-and-configuration
  notes: >
    MAF collapses Azure and OpenAI into a single OpenAIChatCompletionClient.
    Pass azure_endpoint= and api_version=; use credential= (e.g.
    AzureCliCredential) instead of api_key= for Entra auth. Rename required.

# ── Agents ─────────────────────────────────────────────────────────────────────

- name: AssistantAgent
  module: autogen_agentchat.agents
  generation: "0.4"
  status: auto
  maf_equivalent: Agent
  maf_module: agent_framework
  guide_link: https://learn.microsoft.com/en-us/agent-framework/migration-guide/from-autogen/#single-agent-feature-mapping
  ag2_note: AG2 also has AssistantAgent with a compatible constructor signature.
  notes: >
    model_client= → client=; system_message= → instructions=;
    max_tool_iterations= dropped (MAF handles loop termination differently).
    FunctionTool wrappers become @tool-decorated functions passed directly.

