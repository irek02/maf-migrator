# ── Tools ──────────────────────────────────────────────────────────────────────

- name: FunctionTool
  module: autogen_core.tools
  generation: "0.4"
  status: auto
  maf_equivalent: tool
  maf_module: agent_framework
  guide_link: https://learn.microsoft.com/en-us/agent-framework/migration-guide/from-autogen/#single-agent-feature-mapping
  notes: >
    Replace FunctionTool(func=fn, description=...) with @tool decorator on fn.
    MAF infers schema from type annotations + docstring. Use
    Annotated[T, Field(description=...)] for per-param docs.

