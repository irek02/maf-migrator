# AutoGen benchmark corpus — ~25 public repos that import AutoGen.
#
# Fields:
#   name:       short identifier (used as corpus/<name> clone dir)
#   url:        https://github.com/<owner>/<repo>
#   commit:     40-char hex SHA pinned at corpus-build time
#   license:    SPDX identifier
#   generation: v0.4 | v0.2 | mixed
#
# NOTE: commit values below are stub SHAs (placeholder format).
# Re-pin by running: git -C corpus/<name> rev-parse HEAD
# after `scripts/corpus.py` clones each repo.  The stubs satisfy the
# schema validator and let --dry-run work; actual cloning will fail until
# real SHAs are substituted.  Task 1.2 (corpus inventory) is the natural
# time to do the re-pin — run the corpus script, capture the actual HEADs,
# and commit the updated corpus.yaml.

